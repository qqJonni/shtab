{% extends "base.html" %}
{% block title %}Загрузить план — ШТАБ{% endblock %}
{% block topbar_title %}Загрузить план{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4">Загрузить план объекта</h5>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Объект *</label>
            <select name="object_id" class="form-select" required>
              <option value="">Выберите объект</option>
              {% for o in objects %}
                <option value="{{ o.id }}" {% if request.args.get('object_id')|string == o.id|string %}selected{% endif %}>{{ o.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Название плана *</label>
            <input type="text" name="title" class="form-control" placeholder="План 1 этажа" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Уровень / этаж</label>
            <input type="text" name="level_label" class="form-control" placeholder="Этаж 1">
          </div>
          <div class="mb-4">
            <label class="form-label">Файл (PNG / JPG / WEBP) *</label>
            <input type="file" name="file" class="form-control" accept="image/*" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-upload me-1"></i>Загрузить</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
