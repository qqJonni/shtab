{% extends "base.html" %}
{% block title %}Новое замечание — ШТАБ{% endblock %}
{% block topbar_title %}Новое замечание{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4">Новое замечание</h5>
        <form method="post" enctype="multipart/form-data">
          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label class="form-label">Объект *</label>
              <select name="object_id" id="selObject" class="form-select" required>
                <option value="">Выберите объект</option>
                {% for o in objects %}
                  <option value="{{ o.id }}">{{ o.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Этап *</label>
              <select name="stage_id" id="selStage" class="form-select" required>
                <option value="">Сначала выберите объект</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Подэтап (необязательно)</label>
            <select name="substage_id" id="selSubstage" class="form-select">
              <option value="">— не привязан —</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Заголовок *</label>
            <input type="text" name="title" class="form-control" required placeholder="Краткое описание замечания">
          </div>
          <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Подробности…"></textarea>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-sm-4">
              <label class="form-label">Тип</label>
              <select name="type_id" class="form-select">
                <option value="">—</option>
                {% for t in types %}
                  <option value="{{ t.id }}">{{ t.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-sm-4">
              <label class="form-label">Приоритет</label>
              <select name="priority" class="form-select">
                {% for k, v in priority_labels.items() %}
                  <option value="{{ k }}" {% if k == 'normal' %}selected{% endif %}>{{ v }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-sm-4">
              <label class="form-label">Срок устранения</label>
              <input type="date" name="due_date" class="form-control">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Фото «до» (можно несколько)</label>
            <input type="file" name="photos" class="form-control" accept="image/*" multiple>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Создать замечание</button>
            <a href="{{ url_for('defects_list') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('selObject').addEventListener('change', function() {
  var stageSelect = document.getElementById('selStage');
  var subSelect = document.getElementById('selSubstage');
  stageSelect.innerHTML = '<option value="">Загрузка...</option>';
  subSelect.innerHTML = '<option value="">— не привязан —</option>';
  if (!this.value) { stageSelect.innerHTML = '<option value="">Сначала выберите объект</option>'; return; }
  fetch('/api/stages-by-object/' + this.value)
    .then(r => r.json())
    .then(data => {
      stageSelect.innerHTML = '<option value="">Выберите этап</option>';
      data.forEach(s => { stageSelect.innerHTML += '<option value="'+s.id+'">'+s.name+'</option>'; });
    });
});
document.getElementById('selStage').addEventListener('change', function() {
  var subSelect = document.getElementById('selSubstage');
  subSelect.innerHTML = '<option value="">— не привязан —</option>';
  if (!this.value) return;
  fetch('/api/substages-by-stage/' + this.value)
    .then(r => r.json())
    .then(data => {
      data.forEach(s => { subSelect.innerHTML += '<option value="'+s.id+'">'+s.name+'</option>'; });
    });
});
</script>
{% endblock %}
