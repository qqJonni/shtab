{% extends "base.html" %}
{% block title %}{{ org.name }} — ШТАБ{% endblock %}
{% block topbar_title %}Реквизиты организации{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4">{{ org.name }}</h5>
        <form method="post">
          <div class="row g-3 mb-3">
            <div class="col-sm-8">
              <label class="form-label">Название организации *</label>
              <input type="text" name="name" class="form-control" value="{{ org.name }}" required>
            </div>
            <div class="col-sm-4">
              <label class="form-label">Телефон</label>
              <input type="text" name="phone" class="form-control" value="{{ org.phone or '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Адрес</label>
            <input type="text" name="address" class="form-control" value="{{ org.address or '' }}">
          </div>
          <hr class="my-3"><h6 class="fw-bold mb-3" style="font-size:14px">Реквизиты</h6>
          <div class="row g-3 mb-3">
            <div class="col-sm-4">
              <label class="form-label">ИНН</label>
              <input type="text" name="inn" class="form-control" value="{{ org.inn or '' }}">
            </div>
            <div class="col-sm-4">
              <label class="form-label">КПП</label>
              <input type="text" name="kpp" class="form-control" value="{{ org.kpp or '' }}">
            </div>
            <div class="col-sm-4">
              <label class="form-label">ОГРН</label>
              <input type="text" name="ogrn" class="form-control" value="{{ org.ogrn or '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">ОКПО</label>
            <input type="text" name="okpo" class="form-control" value="{{ org.okpo or '' }}">
          </div>
          <hr class="my-3"><h6 class="fw-bold mb-3" style="font-size:14px">Представитель</h6>
          <div class="row g-3 mb-4">
            <div class="col-sm-5">
              <label class="form-label">Должность</label>
              <input type="text" name="rep_position" class="form-control" value="{{ org.rep_position or '' }}" placeholder="Генеральный директор">
            </div>
            <div class="col-sm-7">
              <label class="form-label">ФИО</label>
              <input type="text" name="rep_name" class="form-control" value="{{ org.rep_name or '' }}">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Сохранить</button>
            <a href="{{ url_for('organizations_list') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
