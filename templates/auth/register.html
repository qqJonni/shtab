{% extends "base.html" %}
{% block title %}Регистрация — ШТАБ{% endblock %}
{% block anonymous %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="auth-card">
          <div class="text-center mb-4">
            <div class="auth-logo-icon"><i class="bi bi-building"></i></div>
            <h4 class="fw-bold mb-1">Регистрация</h4>
            <p class="text-muted mb-0">Создайте аккаунт</p>
          </div>
          {% with msgs = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in msgs %}
              <div class="alert alert-{{ cat }} py-2 px-3">{{ msg }}</div>
            {% endfor %}
          {% endwith %}
          <form method="post">
            <div class="mb-3">
              <label class="form-label">ФИО</label>
              <input type="text" name="full_name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Логин</label>
              <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Пароль</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Роль</label>
              <select name="role" class="form-select" required>
                <option value="">Выберите роль</option>
                {% for code in SELF_REGISTER_ROLES %}
                  <option value="{{ code }}">{{ ROLES[code] }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label">Организация (для подрядчика)</label>
              <select name="organization_id" class="form-select">
                <option value="">— не выбрана —</option>
                {% for org in orgs %}
                  <option value="{{ org.id }}">{{ org.name }}</option>
                {% endfor %}
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
          </form>
          <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-decoration-none" style="font-size:14px">Уже есть аккаунт? Войти</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
